# my global config
global:
  scrape_interval: 15s # Set the scrape interval to every 15 seconds. Default is every 1 minute.
  evaluation_interval: 15s # Evaluate rules every 15 seconds. The default is every 1 minute.
  # scrape_timeout is set to the global default (10s).

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 18.208.199.19:9093
# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
rule_files:
    - "alert_rules.yml"
  # - "second_rules.yml"

# A scrape configuration containing exactly one endpoint to scrape:
# Here it's Prometheus itself.
scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: "prometheus"
    static_configs:
      - targets: ["18.208.199.19:9090"]
  - job_name: node_exporter
    ec2_sd_configs:
      - region: us-east-1
        port: 9100

    relabel_configs:

       # Only keep runnning  nodes
       - source_labels: [__meta_ec2_instance_state]
         regex: running
         action: keep

       # Use private IP
       - source_labels: [__meta_ec2_private_ip]
         target_label: __address__
         replacement: '${1}:9100'
       
       # keep only EKS nodes
       - source_labels: [__meta_ec2_tag_k8s_io_cluster_autoscaler_shashank_cluster]
         regex: owned
         action: keep

  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]  # Look for a HTTP 200 response.
    static_configs:
      - targets:
        - http://a6dfef992dee74f38907b8c75066a928-332063228.us-east-1.elb.amazonaws.com/
        - http://18.208.199.19:8080/health
        # Target to probe with http.
    relabel_configs:
      - source_labels:
         - __address__
        target_label: __param_target
      - source_labels:
         - __param_target
        target_label: instance
      - target_label: __address__
        replacement: 18.208.199.19:9115  # The blackbox exporter's real hostname:port.
